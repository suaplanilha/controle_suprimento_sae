<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suprimentos - Gestão de Estoque</title>
    <!-- Tailwind CSS para utilitários -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SheetJS para leitura de Excel (.xls/.xlsx) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- ApexCharts para gráficos do dashboard (opcional) -->
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

    <style>
        :root {
            --azul-escuro: #0f172a;
            --azul-medio: #1e293b;
            --azul-claro: #38bdf8;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--azul-escuro);
            color: #f8fafc;
            overflow: auto;
        }

        /* Animação de fundo flutuante */
        .bg-blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.12) 0%, rgba(15, 23, 42, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(80px);
            animation: move 25s infinite alternate ease-in-out;
        }

        @keyframes move {
            0% { transform: translate(-20%, -20%) scale(1); }
            100% { transform: translate(30%, 30%) scale(1.1); }
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .side-image {
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            position: relative;
            overflow: auto;
        }

        /* Overlay de Suprimentos/Estoque */
        .inventory-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=1470&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            opacity: 0.1;
            mix-blend-mode: overlay;
        }

        /* ANIMAÇÃO DE FLUXO DE SUPRIMENTOS */
        .supply-node {
            position: absolute;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 12px;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            animation: float-supply 10s infinite linear;
            opacity: 0;
        }

        @keyframes float-supply {
            0% { transform: translateY(100px) translateX(-20px); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-150px) translateX(20px); opacity: 0; }
        }

        .node-1 { left: 10%; animation-delay: 0s; }
        .node-2 { right: 15%; animation-delay: 3s; animation-duration: 12s; }
        .node-3 { left: 40%; animation-delay: 6s; animation-duration: 8s; }

        input:focus {
            outline: none;
            border-color: var(--azul-claro);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.4);
            filter: brightness(1.1);
        }


        .skeleton-shimmer {
            position: relative;
            overflow: hidden;
            background: rgba(51, 65, 85, 0.5);
        }

        .skeleton-shimmer::after {
            content: '';
            position: absolute;
            inset: 0;
            transform: translateX(-100%);
            background: linear-gradient(90deg, transparent, rgba(148, 163, 184, 0.18), transparent);
            animation: skeleton-shimmer 1.2s infinite;
        }

        @keyframes skeleton-shimmer {
            100% { transform: translateX(100%); }
        }

        @media (max-width: 768px) {
            .side-content { display: none; }
            .login-container { grid-template-columns: 1fr; }
        }


        .scroll-invisible {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .scroll-invisible::-webkit-scrollbar {
            width: 0;
            height: 0;
            display: none;
        }

        .animate-slide-up {
            animation: slideUp 0.8s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="app" class="min-h-screen bg-slate-950 text-slate-100 flex flex-col">
        <template v-if="!isAuthenticated">
            <div class="min-h-screen flex items-center justify-center p-4 relative">
                <div class="bg-blob"></div>

                <div class="login-container grid grid-cols-2 w-full max-w-6xl h-[650px] glass-card rounded-[2rem] overflow-hidden animate-slide-up">
                    <div class="side-content side-image flex flex-col justify-between p-16">
                        <div class="inventory-overlay"></div>

                        <div class="relative z-10">
                            <p class="text-xs uppercase tracking-[0.25em] text-slate-400 font-semibold mb-4">SKU-482 In</p>
                            <h1 class="text-4xl md:text-5xl font-black text-white leading-tight mb-6">Confirmado<br/>Enviado<br/><span class="text-sky-400">Suprimentos</span></h1>
                            <p class="text-slate-300/90 max-w-md text-sm">Sistema inteligente para controle de estoque, logística e fluxo de materiais.</p>
                        </div>

                        <div class="relative z-10">
                            <div class="flex items-center gap-4 mb-2">
                                <div class="w-10 h-10 rounded-xl bg-slate-800/70 border border-slate-600/40 flex items-center justify-center">
                                    <i data-lucide="shield-check" class="w-5 h-5 text-slate-400"></i>
                                </div>
                                <div>
                                    <p class="text-[10px] text-slate-500 uppercase tracking-[0.2em] font-bold">Gestão Geral</p>
                                    <p class="text-base text-white font-semibold">Denilson Almeida</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 mt-8">
                                <div class="w-2 h-2 bg-sky-500 rounded-full animate-pulse"></div>
                                <div class="text-slate-500 text-[10px] uppercase tracking-[0.3em] font-bold">Enterprise System v2.0</div>
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col justify-center p-12 md:p-20 bg-slate-900/40 backdrop-blur-md">
                        <div class="w-full max-w-sm mx-auto">
                            <div class="mb-12">
                                <div class="inline-block md:hidden mb-6">
                                    <h1 class="text-2xl font-black text-sky-400 uppercase">Suprimentos</h1>
                                </div>
                                <h2 class="text-3xl font-bold text-white mb-3">Autenticação</h2>
                                <p class="text-slate-400 font-light">Insira suas credenciais para gerenciar o estoque.</p>
                            </div>

                            <form @submit.prevent="handleLogin" class="space-y-6">
                                <div class="space-y-2">
                                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">ID de Acesso / E-mail</label>
                                    <div class="relative group">
                                        <span class="absolute left-4 top-3.5 text-slate-500 transition-colors group-focus-within:text-sky-400">
                                            <i data-lucide="user-circle" class="w-5 h-5"></i>
                                        </span>
                                        <input v-model="form.email" type="text" placeholder="denilson@suprimentos.com" class="w-full bg-slate-800/40 border border-slate-700/50 text-white rounded-2xl py-4 pl-12 pr-4 transition-all duration-300" required>
                                    </div>
                                </div>

                                <div class="space-y-2">
                                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Senha Operacional</label>
                                    <div class="relative group">
                                        <span class="absolute left-4 top-3.5 text-slate-500 transition-colors group-focus-within:text-sky-400">
                                            <i data-lucide="key" class="w-5 h-5"></i>
                                        </span>
                                        <input v-model="form.password" type="password" placeholder="••••••••" class="w-full bg-slate-800/40 border border-slate-700/50 text-white rounded-2xl py-4 pl-12 pr-4 transition-all duration-300" required>
                                    </div>
                                </div>

                                <p v-if="errorMessage" class="text-red-300 bg-red-900/30 border border-red-500/40 rounded-xl px-4 py-3 text-sm">{{ errorMessage }}</p>

                                <button type="submit" :disabled="loading" class="btn-primary w-full text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3 group disabled:opacity-50 disabled:cursor-not-allowed mt-4">
                                    <span v-if="loading" class="animate-spin rounded-full h-5 w-5 border-2 border-white/30 border-t-white"></span>
                                    <span v-else>Entrar no Sistema</span>
                                    <i v-if="!loading" data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <template v-else>
            <div class="flex-1 min-h-0 flex">
                <aside class="w-72 border-r border-slate-800 bg-slate-900/70 p-6 flex flex-col">
                    <h1 class="text-xl font-black text-sky-400 uppercase mb-1">Suprimentos</h1>
                    <p class="text-xs text-slate-500 mb-8">Enterprise System v2.0</p>

                    <p class="text-xs uppercase tracking-wider text-slate-500 font-semibold mb-3">Páginas permitidas</p>
                    <div class="space-y-2 flex-1">
                        <button
                            v-for="page in session.user.allowed_pages"
                            :key="page"
                            @click="goToPage(page)"
                            class="w-full text-left px-3 py-2 rounded-xl border transition-all"
                            :class="currentPage === page ? 'border-sky-400 bg-sky-500/20 text-sky-300' : 'border-slate-700/70 bg-slate-800/40 text-slate-200 hover:border-slate-500'"
                        >
                            {{ page }}
                        </button>
                    </div>

                    <button @click="logout" class="mt-6 w-full border border-slate-700 text-slate-200 hover:bg-slate-800/50 font-semibold py-3 rounded-2xl">Sair</button>
                </aside>

                <main class="flex-1 p-8 md:p-10 overflow-y-auto scroll-invisible">
                    <div class="mb-8 flex items-center justify-between">
                        <div>
                            <h2 class="text-3xl font-bold text-white">Olá, {{ session.user.nome }}</h2>
                            <p class="text-slate-400">Perfil {{ session.user.role }} | Página ativa: <span class="text-sky-400">{{ currentPage }}</span></p>
                        </div>
                    </div>

                    <p v-if="errorMessage" class="mb-6 text-red-300 bg-red-900/30 border border-red-500/40 rounded-xl px-4 py-3 text-sm">{{ errorMessage }}</p>

                    <section class="glass-card rounded-3xl p-8 min-h-[320px] space-y-6">
                        <div class="flex items-center justify-between">
                            <h3 class="text-xl font-semibold text-white">Módulo {{ currentPage }}</h3>
                            <button @click="loadCurrentModule" class="text-xs px-3 py-2 rounded-lg border border-slate-600 text-slate-200 hover:bg-slate-800/50">Atualizar</button>
                        </div>

                        <template v-if="moduleLoading && !['insumos', 'movimentacoes'].includes(currentPage)">
                            <p class="text-slate-400">Carregando dados do módulo...</p>
                        </template>

                        <template v-else-if="currentPage === 'dashboard'">
                            <div class="flex flex-wrap gap-3 items-center">
                                <select v-model="dashboardFilters.year" class="bg-slate-900/50 border border-slate-700 rounded-xl px-3 py-2 text-sm">
                                    <option v-for="year in dashboardYearOptions" :key="`dashboard-year-${year}`" :value="year">{{ year }}</option>
                                </select>
                                <select v-model="dashboardFilters.month" class="bg-slate-900/50 border border-slate-700 rounded-xl px-3 py-2 text-sm">
                                    <option value="">Todos os meses</option>
                                    <option v-for="month in dashboardMonthOptions" :key="`dashboard-month-${month.value}`" :value="month.value">{{ month.label }}</option>
                                </select>
                                <input v-model="dashboardFilters.query" placeholder="Buscar AX ou descrição" class="flex-1 min-w-[240px] bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2" />
                                <button @click="applyDashboardFilters" :disabled="moduleLoading" class="btn-primary rounded-xl px-4 py-2 text-sm disabled:opacity-50">Atualizar KPIs</button>
                            </div>
                            <div class="grid md:grid-cols-4 gap-4">
                                <div class="p-4 rounded-xl bg-slate-800/50 border border-slate-700"><p class="text-xs text-slate-400">Total Itens</p><p class="text-2xl font-bold">{{ moduleData.dashboard?.summary?.total ?? '-' }}</p></div>
                                <div class="p-4 rounded-xl bg-slate-800/50 border border-slate-700"><p class="text-xs text-slate-400">Críticos</p><p class="text-2xl font-bold text-red-300">{{ moduleData.dashboard?.summary?.criticos ?? '-' }}</p></div>
                                <div class="p-4 rounded-xl bg-slate-800/50 border border-slate-700"><p class="text-xs text-slate-400">Em Alerta</p><p class="text-2xl font-bold text-amber-300">{{ moduleData.dashboard?.summary?.em_alerta ?? '-' }}</p></div>
                                <div class="p-4 rounded-xl bg-slate-800/50 border border-slate-700"><p class="text-xs text-slate-400">Saudáveis</p><p class="text-2xl font-bold text-emerald-300">{{ moduleData.dashboard?.summary?.saudaveis ?? '-' }}</p></div>
                            </div>
                            <div class="flex items-center justify-between text-xs text-slate-400">
                                <p>Visualização gráfica opcional para leitura gerencial.</p>
                                <label class="inline-flex items-center gap-2 cursor-pointer">
                                    <input v-model="dashboardChartsEnabled" @change="applyDashboardFilters" type="checkbox" class="rounded border-slate-600 bg-slate-900/50" />
                                    <span>Habilitar gráficos</span>
                                </label>
                            </div>
                            <p v-if="dashboardChartsEnabled && !dashboardChartsState.available" class="text-xs text-amber-300 border border-amber-600/40 rounded-xl px-3 py-2">ApexCharts indisponível no ambiente atual. Mantendo cards e tabela como fallback.</p>
                            <div v-if="dashboardChartsEnabled && dashboardChartsState.available" class="grid md:grid-cols-2 gap-4">
                                <div class="border border-slate-700 rounded-xl p-3">
                                    <p class="text-xs uppercase text-slate-500 mb-2">Série temporal de consumo (SAÍDA)</p>
                                    <div id="dashboard-consumo-chart" class="min-h-[240px]"></div>
                                </div>
                                <div class="border border-slate-700 rounded-xl p-3">
                                    <p class="text-xs uppercase text-slate-500 mb-2">Disponível hoje x Ponto de ressuprimento (Top críticos)</p>
                                    <div id="dashboard-critic-chart" class="min-h-[240px]"></div>
                                </div>
                            </div>
                            <p v-if="dashboardRowsLimited" class="text-xs text-amber-300 border border-amber-600/40 rounded-xl px-3 py-2">Exibindo os primeiros {{ DASHBOARD_MAX_ROWS }} itens para preservar performance. Refine os filtros para análise detalhada.</p>
                            <div class="max-h-96 overflow-auto border border-slate-700 rounded-xl">
                                <table class="w-full text-sm">
                                    <thead class="bg-slate-900/60 text-slate-300"><tr><th class="p-2 text-left">Código AX</th><th class="p-2 text-left">Descrição</th><th class="p-2 text-right">Consumo no Período</th><th class="p-2 text-right">Disponível Hoje</th><th class="p-2 text-right">Ponto Ressupr.</th><th class="p-2 text-right">Dias Estimados</th><th class="p-2 text-right">Meses Estimados</th><th class="p-2 text-right">Média Mensal</th><th class="p-2 text-right">Lead Time</th><th class="p-2 text-right">Consenso</th><th class="p-2 text-center">Status</th></tr></thead>
                                    <tbody>
                                        <template v-if="moduleLoading">
                                            <tr v-for="n in 8" :key="`dash-kpi-skeleton-${n}`" class="border-t border-slate-800">
                                                <td class="p-2" colspan="11"><div class="h-4 rounded skeleton-shimmer"></div></td>
                                            </tr>
                                        </template>
                                        <template v-else>
                                            <tr v-for="item in dashboardRows" :key="item.uuid" class="border-t border-slate-800">
                                                <td class="p-2">{{ item.codigo_ax || '-' }}</td>
                                                <td class="p-2">{{ item.descricao || '-' }}</td>
                                                <td class="p-2 text-right">{{ sanitizeNumberUi(item.consumo_periodo) }}</td>
                                                <td class="p-2 text-right">{{ sanitizeNumberUi(item.saldo_atual) }}</td>
                                                <td class="p-2 text-right">{{ sanitizeNumberUi(item.ponto_ressuprimento) }}</td>
                                                <td class="p-2 text-right">{{ item.dias_estimados_consumo === null ? '-' : sanitizeNumberUi(item.dias_estimados_consumo) }}</td>
                                                <td class="p-2 text-right">{{ item.meses_estimados_consumo === null ? '-' : sanitizeNumberUi(item.meses_estimados_consumo) }}</td>
                                                <td class="p-2 text-right">{{ sanitizeNumberUi(item.consumo_medio_mensal) }}</td>
                                                <td class="p-2 text-right">{{ sanitizeNumberUi(item.lead_time) }}</td>
                                                <td class="p-2 text-right">{{ sanitizeNumberUi(item.consenso_dias) }}</td>
                                                <td class="p-2 text-center">
                                                    <span class="text-[11px] font-semibold px-2 py-1 rounded-full" :class="item.status_estoque === 'CRITICO' ? 'bg-red-500/20 text-red-300' : (item.status_estoque === 'ALERTA' ? 'bg-amber-500/20 text-amber-300' : 'bg-emerald-500/20 text-emerald-300')">{{ item.status_estoque || '-' }}</span>
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                                <p v-if="!moduleLoading && !dashboardRows.length" class="p-3 text-slate-500">Sem consumo no período/filtros selecionados.</p>
                            </div>
                            <p class="text-slate-300">{{ pageContent[currentPage] }}</p>
                        </template>

                        <template v-else-if="currentPage === 'insumos'">
                            <div class="flex flex-wrap gap-3 items-center">
                                <input v-model="insumosQuery" @input="goToInsumosPage(1)" placeholder="Buscar AX, descrição ou fornecedor" class="flex-1 min-w-[240px] bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2" />
                                <select v-model="insumosStatus" @change="goToInsumosPage(1)" class="bg-slate-900/50 border border-slate-700 rounded-xl px-3 py-2 text-sm">
                                    <option value="ATIVO">Ativos</option>
                                    <option value="INATIVO">Inativos</option>
                                    <option value="">Todos</option>
                                </select>
                                <button @click="openInsumoCreateModal" class="btn-primary rounded-xl px-4 py-2 text-sm">Novo Insumo</button>
                            </div>
                            <div class="flex items-center justify-between text-xs text-slate-400">
                                <p>Cadastro mestre de insumos</p>
                                <p>Página {{ insumosTable.pagination.page }} de {{ insumosTable.pagination.totalPages }}</p>
                            </div>
                            <div class="max-h-80 overflow-auto border border-slate-700 rounded-xl">
                                <table class="w-full text-sm">
                                    <thead class="bg-slate-900/60 text-slate-300"><tr><th class="p-2 text-left">AX</th><th class="p-2 text-left">Descrição</th><th class="p-2 text-left">Unid.</th><th class="p-2 text-left">Fornecedor</th><th class="p-2 text-right">Lead Time</th><th class="p-2 text-right">Est. Mínimo</th><th class="p-2 text-right">Consenso</th><th class="p-2 text-center">Categoria</th><th class="p-2 text-center">Status</th><th class="p-2 text-center">Ações</th></tr></thead>
                                    <tbody>
                                        <template v-if="insumosTable.loading || moduleLoading">
                                            <tr v-for="n in 6" :key="`insumo-skeleton-${n}`" class="border-t border-slate-800">
                                                <td class="p-2" colspan="10"><div class="h-4 rounded skeleton-shimmer"></div></td>
                                            </tr>
                                        </template>
                                        <template v-else>
                                            <tr v-for="item in insumosTable.rows" :key="item.uuid" class="border-t border-slate-800">
                                                <td class="p-2">{{ item.codigo_ax }}</td>
                                                <td class="p-2">{{ item.descricao }}</td>
                                                <td class="p-2">{{ item.unidade || '-' }}</td>
                                                <td class="p-2">{{ item.fornecedor_nome || '-' }}</td>
                                                <td class="p-2 text-right">{{ sanitizeNumberUi(item.lead_time) }}</td>
                                                <td class="p-2 text-right">{{ sanitizeNumberUi(item.estoque_minimo) }}</td>
                                                <td class="p-2 text-right">{{ sanitizeNumberUi(item.consenso_dias) }}</td>
                                                <td class="p-2 text-center">{{ item.categoria || '-' }}</td>
                                                <td class="p-2 text-center">{{ item.ativo || '-' }}</td>
                                                <td class="p-2 text-center">
                                                    <div class="flex items-center justify-center gap-2">
                                                        <button @click="openInsumoEditModal(item)" class="inline-flex items-center justify-center w-8 h-8 border border-sky-600 rounded text-sky-200 hover:bg-sky-500/10" title="Editar insumo" aria-label="Editar insumo">
                                                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
                                                        </button>
                                                        <button @click="softDeleteInsumo(item)" :disabled="insumosTable.loading" class="inline-flex items-center justify-center w-8 h-8 border border-red-600 rounded text-red-200 hover:bg-red-500/10 disabled:opacity-40" title="Inativar insumo" aria-label="Inativar insumo">
                                                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>

                        <template v-else-if="currentPage === 'compras'">

                                <div class="p-4 rounded-xl bg-slate-800/50 border border-slate-700"><p class="text-xs text-slate-400">Itens Críticos</p><p class="text-2xl font-bold">{{ moduleData.compras?.itens_criticos ?? '-' }}</p></div>
                                <div class="p-4 rounded-xl bg-slate-800/50 border border-slate-700"><p class="text-xs text-slate-400">Cobertura (meses)</p><p class="text-2xl font-bold">{{ moduleData.compras?.cobertura_estoque_global_meses ?? '-' }}</p></div>

                                <button @click="runBackupSnapshot" class="border border-slate-600 rounded-xl px-4 py-2 hover:bg-slate-800/50">Executar snapshot semanal</button>
                                <button @click="runBackendTests" class="border border-slate-600 rounded-xl px-4 py-2 hover:bg-slate-800/50">Executar teste de cálculo</button>

        </template>
        <footer class="border-t border-slate-800/80 bg-slate-950/90 text-slate-400 text-xs text-center py-3">copyright @SAE - Apollo Eficaz - 2026</footer>
    </div>

    <script>
        const { createApp, ref, reactive, computed, onMounted, nextTick } = Vue;

        createApp({
            setup() {
                const GAS_CLIENT_CONFIG = Object.freeze({
                    timeoutMs: 20000,
                    retries: 2,
                    backoffBaseMs: 300
                });

                const loading = ref(false);
                const moduleLoading = ref(false);
                const errorMessage = ref('');
                const session = ref(null);
                const currentPage = ref('dashboard');
                const now = new Date();
                const DASHBOARD_MAX_ROWS = 300;
                const DASHBOARD_CACHE_TTL_MS = 2 * 60 * 1000;
                const form = reactive({ email: '', password: '' });
                const dashboardFilters = reactive({
                    year: now.getFullYear(),
                    month: '',
                    query: ''
                });
                const dashboardYearOptions = Array.from({ length: 6 }, (_, idx) => now.getFullYear() - idx);
                const dashboardMonthOptions = [
                    { value: 1, label: 'Janeiro' },
                    { value: 2, label: 'Fevereiro' },
                    { value: 3, label: 'Março' },
                    { value: 4, label: 'Abril' },
                    { value: 5, label: 'Maio' },
                    { value: 6, label: 'Junho' },
                    { value: 7, label: 'Julho' },
                    { value: 8, label: 'Agosto' },
                    { value: 9, label: 'Setembro' },
                    { value: 10, label: 'Outubro' },
                    { value: 11, label: 'Novembro' },
                    { value: 12, label: 'Dezembro' }
                ];
                const dashboardChartsEnabled = ref(true);
                const dashboardChartsState = reactive({
                    available: typeof ApexCharts !== 'undefined',
                    consumoChart: null,
                    criticChart: null
                });
                const dashboardCache = reactive({ byKey: {} });
                const insumosQuery = ref('');
                const insumosStatus = ref('ATIVO');
                const fornecedoresQuery = ref('');
                const fornecedoresStatus = ref('ATIVO');
                const uploadHistory = ref([]);
                const movimentacoesTable = reactive({
                    loading: false,
                    rows: [],
                    pagination: { page: 1, pageSize: 20, total: 0, totalPages: 1 },
                    deletingUuid: ''
                });
                const insumosLookupCache = reactive({ loaded: false, loading: false, loadedAt: 0, byCodigo: {} });
                const insumosTable = reactive({
                    loading: false,
                    rows: [],
                    pagination: { page: 1, pageSize: 20, total: 0, totalPages: 1 }
                });
                const fornecedoresTable = reactive({
                    loading: false,
                    rows: [],
                    pagination: { page: 1, pageSize: 20, total: 0, totalPages: 1 }
                });

                const createInsumoFormState = () => ({
                    uuid: '',
                    codigo_ax: '',
                    descricao: '',
                    unidade: 'UN',
                    fornecedor_id: '',
                    lead_time: '',
                    estoque_minimo: '',
                    consenso_dias: '',
                    categoria: 'C'
                });
                const insumoForm = reactive(createInsumoFormState());
                const insumoModal = reactive({ open: false, mode: 'create', loading: false });
                const fornecedorOptions = ref([]);

                const createFornecedorFormState = () => ({
                    uuid: '',
                    nome_fantasia: '',
                    razao_social: '',
                    cnpj: '',
                    contato: '',
                    telefone: '',
                    email: '',
                    frete: ''
                });
                const fornecedorForm = reactive(createFornecedorFormState());
                const fornecedorModal = reactive({ open: false, mode: 'create', loading: false });

                const createModuleState = () => ({ dashboard: null, insumos: null, fornecedores: null, compras: null });
                const moduleData = reactive(createModuleState());

                const createMovFormState = () => ({
                    codigo_ax: '',
                    descricao: '',
                    tipo: 'ENTRADA',
                    quantidade: '',
                    observacao: ''
                });
                const movForm = reactive(createMovFormState());
                const manualModal = reactive({ open: false });

                const createBulkModalState = () => ({
                    open: false,
                    loading: false,
                    fileName: '',
                    data_iso: '',
                    tipo: 'SAIDA',
                    observacao: '',
                    rawRows: [],
                    previewRows: []
                });
                const bulkModal = reactive(createBulkModalState());
                const processModal = reactive({ open: false, title: '', message: '' });
                const successModal = reactive({ open: false, title: '', message: '' });

                const pageContent = {
                    dashboard: 'Visão executiva com KPIs de estoque crítico e consumo médio.',
                    insumos: 'Cadastro mestre de insumos, lead time e classificação ABC.',
                    fornecedores: 'Cadastro e gestão de fornecedores com contato e custo de frete.',
                    movimentacoes: 'Registro e auditoria de entradas, saídas e ajustes de estoque.',
                    compras: 'Lista de ressuprimento e planejamento de compras por criticidade.',
                    configuracoes: 'Parâmetros do sistema e administração de usuários.'
                };

                const isAuthenticated = computed(() => !!session.value);
                const dashboardRows = computed(() => {
                    const rows = Array.isArray(moduleData.dashboard?.data) ? moduleData.dashboard.data : [];
                    return rows.slice(0, DASHBOARD_MAX_ROWS);
                });
                const dashboardRowsLimited = computed(() => {
                    const rows = Array.isArray(moduleData.dashboard?.data) ? moduleData.dashboard.data : [];
                    return rows.length > DASHBOARD_MAX_ROWS;
                });

                const refreshIcons = async () => {
                    await nextTick();
                    lucide.createIcons();
                };

                const pendingQueue = [];
                let queueRunning = false;

                const logCall = (event, payload) => {
                    console.log('[SAE:GAS]', JSON.stringify({ event, at: new Date().toISOString(), ...payload }));
                };

                const withTimeout = (promise, timeoutMs, method) => new Promise((resolve, reject) => {
                    const timer = setTimeout(() => reject(new Error(`Timeout ao chamar ${method} (${timeoutMs}ms)`)), timeoutMs);
                    promise.then((value) => { clearTimeout(timer); resolve(value); }).catch((error) => { clearTimeout(timer); reject(error); });
                });

                const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

                const runGASDirect = (method, ...args) => new Promise((resolve, reject) => {
                    if (typeof google === 'undefined' || !google?.script?.run) {
                        reject(new Error('Ambiente GAS indisponível neste preview.'));
                        return;
                    }
                    google.script.run
                        .withSuccessHandler(resolve)
                        .withFailureHandler(reject)[method](...args);
                });

                const runWithRetry = async (method, args) => {
                    let attempt = 0;
                    while (attempt <= GAS_CLIENT_CONFIG.retries) {
                        try {
                            logCall('request_start', { method, attempt });
                            const response = await withTimeout(runGASDirect(method, ...args), GAS_CLIENT_CONFIG.timeoutMs, method);
                            logCall('request_success', { method, attempt });
                            return response;
                        } catch (error) {
                            logCall('request_error', { method, attempt, error: error?.message || String(error) });
                            if (attempt >= GAS_CLIENT_CONFIG.retries) throw error;
                            const delay = GAS_CLIENT_CONFIG.backoffBaseMs * Math.pow(2, attempt);
                            await sleep(delay);
                        }
                        attempt += 1;
                    }
                };

                const runQueue = async () => {
                    if (queueRunning || !pendingQueue.length) return;
                    queueRunning = true;
                    const next = pendingQueue.shift();
                    try {
                        const response = await runWithRetry(next.method, next.args);
                        next.resolve(response);
                    } catch (error) {
                        next.reject(error);
                    } finally {
                        queueRunning = false;
                        runQueue();
                    }
                };

                const runGAS = (method, ...args) => new Promise((resolve, reject) => {
                    pendingQueue.push({ method, args, resolve, reject });
                    runQueue();
                });

                const dashboardFilterPayload = () => {
                    const currentYear = new Date().getFullYear();
                    const year = Number(dashboardFilters.year || currentYear);
                    const month = dashboardFilters.month === '' ? undefined : Number(dashboardFilters.month);

                    if (!Number.isFinite(year) || year < 2000 || year > currentYear + 1) {
                        throw new Error(`Ano inválido para dashboard: ${dashboardFilters.year}`);
                    }
                    if (month !== undefined && (!Number.isFinite(month) || month < 1 || month > 12)) {
                        throw new Error(`Mês inválido para dashboard: ${dashboardFilters.month}`);
                    }

                    return {
                        year,
                        month,
                        query: String(dashboardFilters.query || '').trim(),
                        period_only: true
                    };
                };

                const getDashboardFromCache = (key) => {
                    const cacheItem = dashboardCache.byKey[key];
                    if (!cacheItem) return null;
                    if ((Date.now() - cacheItem.ts) > DASHBOARD_CACHE_TTL_MS) return null;
                    return cacheItem.data;
                };

                const setDashboardCache = (key, data) => {
                    dashboardCache.byKey[key] = { ts: Date.now(), data };
                };

                const destroyDashboardCharts = () => {
                    if (dashboardChartsState.consumoChart) {
                        dashboardChartsState.consumoChart.destroy();
                        dashboardChartsState.consumoChart = null;
                    }
                    if (dashboardChartsState.criticChart) {
                        dashboardChartsState.criticChart.destroy();
                        dashboardChartsState.criticChart = null;
                    }
                };

                const renderDashboardCharts = async () => {
                    if (!dashboardChartsEnabled.value || !dashboardChartsState.available) {
                        destroyDashboardCharts();
                        return;
                    }

                    await nextTick();
                    const rows = dashboardRows.value;
                    const monthly = Array.isArray(moduleData.dashboard?.charts?.consumo_mensal) ? moduleData.dashboard.charts.consumo_mensal : [];

                    const consumoEl = document.querySelector('#dashboard-consumo-chart');
                    const criticEl = document.querySelector('#dashboard-critic-chart');
                    if (!consumoEl || !criticEl) return;

                    destroyDashboardCharts();

                    const consumoOptions = {
                        chart: { type: 'line', height: 240, toolbar: { show: false }, foreColor: '#cbd5e1' },
                        series: [{ name: 'Consumo', data: monthly.map(item => Number(item.consumo || 0)) }],
                        xaxis: { categories: monthly.map(item => String(item.label || '')) },
                        stroke: { curve: 'smooth', width: 2 },
                        colors: ['#38bdf8'],
                        grid: { borderColor: 'rgba(148,163,184,0.2)' }
                    };

                    const criticalRows = rows
                        .filter(item => String(item.status_estoque || '').toUpperCase() !== 'OK')
                        .slice(0, 10);

                    const criticOptions = {
                        chart: { type: 'bar', height: 240, stacked: false, toolbar: { show: false }, foreColor: '#cbd5e1' },
                        series: [
                            { name: 'Disponível', data: criticalRows.map(item => Number(item.saldo_atual || 0)) },
                            { name: 'Ponto Ressupr.', data: criticalRows.map(item => Number(item.ponto_ressuprimento || 0)) }
                        ],
                        xaxis: { categories: criticalRows.map(item => String(item.codigo_ax || '-')) },
                        colors: ['#22c55e', '#f59e0b'],
                        grid: { borderColor: 'rgba(148,163,184,0.2)' }
                    };

                    dashboardChartsState.consumoChart = new ApexCharts(consumoEl, consumoOptions);
                    dashboardChartsState.criticChart = new ApexCharts(criticEl, criticOptions);
                    await dashboardChartsState.consumoChart.render();
                    await dashboardChartsState.criticChart.render();
                };

                const loadDashboard = async () => {
                    moduleLoading.value = true;
                    try {
                        const payload = dashboardFilterPayload();
                        const cacheKey = JSON.stringify(payload);
                        const cached = getDashboardFromCache(cacheKey);
                        if (cached) {
                            moduleData.dashboard = cached;
                        } else {
                            const resp = await runGAS('getDashboardData', payload);
                            if (resp.success === false) throw new Error(resp.message);
                            moduleData.dashboard = resp;
                            setDashboardCache(cacheKey, resp);
                        }
                        await renderDashboardCharts();
                    } finally {
                        moduleLoading.value = false;
                    }
                };

                const applyDashboardFilters = async () => {
                    await loadDashboard();
                };

                const loadInsumos = async (page = 1) => {
                    moduleLoading.value = true;
                    insumosTable.loading = true;
                    try {
                        const resp = await runGAS('listInsumos', {
                            page,
                            pageSize: 20,
                            query: insumosQuery.value,
                            status: insumosStatus.value
                        });
                        if (resp.success === false) throw new Error(resp.message);
                        insumosTable.rows = resp.data || [];
                        insumosTable.pagination = resp.pagination || { page: 1, pageSize: 20, total: 0, totalPages: 1 };
                        moduleData.insumos = { data: insumosTable.rows, pagination: insumosTable.pagination };
                    } finally {
                        insumosTable.loading = false;
                        moduleLoading.value = false;
                    }
                };

                const goToInsumosPage = async (page) => {
                    const target = Math.max(1, Number(page || 1));
                    await loadInsumos(target);
                };
                const ensureFornecedorOptions = async () => {
                    const resp = await runGAS('getFornecedorOptions');
                    if (resp.success === false) throw new Error(resp.message);
                    fornecedorOptions.value = Array.isArray(resp.data) ? resp.data : [];
                };

                const openInsumoCreateModal = async () => {
                    Object.assign(insumoForm, createInsumoFormState());
                    insumoModal.mode = 'create';
                    insumoModal.open = true;
                    await ensureFornecedorOptions();
                };

                const openInsumoEditModal = async (item) => {
                    Object.assign(insumoForm, {
                        uuid: String(item.uuid || ''),
                        codigo_ax: String(item.codigo_ax || ''),
                        descricao: String(item.descricao || ''),
                        unidade: String(item.unidade || 'UN'),
                        fornecedor_id: String(item.fornecedor_id || ''),
                        lead_time: Number(item.lead_time || 0),
                        estoque_minimo: Number(item.estoque_minimo || 0),
                        consenso_dias: Number(item.consenso_dias || 0),
                        categoria: String(item.categoria || 'C')
                    });
                    insumoModal.mode = 'edit';
                    insumoModal.open = true;
                    await ensureFornecedorOptions();
                };

                const closeInsumoModal = () => {
                    insumoModal.open = false;
                    insumoModal.loading = false;
                    Object.assign(insumoForm, createInsumoFormState());
                };

                const saveInsumoForm = async () => {
                    insumoModal.loading = true;
                    try {
                        const payload = {
                            uuid: insumoForm.uuid || undefined,
                            codigo_ax: insumoForm.codigo_ax,
                            descricao: insumoForm.descricao,
                            unidade: insumoForm.unidade,
                            fornecedor_id: insumoForm.fornecedor_id,
                            lead_time: Number(insumoForm.lead_time || 0),
                            estoque_minimo: Number(insumoForm.estoque_minimo || 0),
                            consenso_dias: Number(insumoForm.consenso_dias || 0),
                            categoria: insumoForm.categoria,
                            usuario_email: session.value?.user?.email
                        };
                        const resp = await runGAS('saveInsumo', payload);
                        if (resp.success === false) throw new Error(resp.message);
                        closeInsumoModal();
                        await loadInsumos(insumosTable.pagination.page || 1);
                        ensureInsumosLookupCache(true).catch(() => {});
                    } catch (error) {
                        errorMessage.value = error.message || String(error);
                    } finally {
                        insumoModal.loading = false;
                    }
                };

                const softDeleteInsumo = async (item) => {
                    const uuid = String(item?.uuid || '').trim();
                    if (!uuid) return;
                    const ok = window.confirm(`Confirma inativar o insumo ${item.codigo_ax} - ${item.descricao}?`);
                    if (!ok) return;
                    try {
                        const resp = await runGAS('inactivateInsumo', {
                            uuid,
                            usuario_email: session.value?.user?.email
                        });
                        if (resp.success === false) throw new Error(resp.message);
                        await loadInsumos(insumosTable.pagination.page || 1);
                        ensureInsumosLookupCache(true).catch(() => {});
                    } catch (error) {
                        errorMessage.value = error.message || String(error);
                    }
                };

                const loadFornecedores = async (page = 1) => {
                    moduleLoading.value = true;
                    fornecedoresTable.loading = true;
                    try {
                        const resp = await runGAS('listFornecedores', {
                            page,
                            pageSize: 20,
                            query: fornecedoresQuery.value,
                            status: fornecedoresStatus.value
                        });
                        if (resp.success === false) throw new Error(resp.message);
                        fornecedoresTable.rows = resp.data || [];
                        fornecedoresTable.pagination = resp.pagination || { page: 1, pageSize: 20, total: 0, totalPages: 1 };
                        moduleData.fornecedores = { data: fornecedoresTable.rows, pagination: fornecedoresTable.pagination };
                    } finally {
                        fornecedoresTable.loading = false;
                        moduleLoading.value = false;
                    }
                };

                const goToFornecedoresPage = async (page) => {
                    const target = Math.max(1, Number(page || 1));
                    await loadFornecedores(target);
                };

                const openFornecedorCreateModal = () => {
                    Object.assign(fornecedorForm, createFornecedorFormState());
                    fornecedorModal.mode = 'create';
                    fornecedorModal.open = true;
                };

                const openFornecedorEditModal = (item) => {
                    Object.assign(fornecedorForm, {
                        uuid: String(item.uuid || ''),
                        nome_fantasia: String(item.nome_fantasia || ''),
                        razao_social: String(item.razao_social || ''),
                        cnpj: String(item.cnpj || ''),
                        contato: String(item.contato || ''),
                        telefone: String(item.telefone || ''),
                        email: String(item.email || ''),
                        frete: Number(item.frete || 0)
                    });
                    fornecedorModal.mode = 'edit';
                    fornecedorModal.open = true;
                };

                const closeFornecedorModal = () => {
                    fornecedorModal.open = false;
                    fornecedorModal.loading = false;
                    Object.assign(fornecedorForm, createFornecedorFormState());
                };

                const saveFornecedorForm = async () => {
                    fornecedorModal.loading = true;
                    try {
                        const payload = {
                            uuid: fornecedorForm.uuid || undefined,
                            nome_fantasia: fornecedorForm.nome_fantasia,
                            razao_social: fornecedorForm.razao_social,
                            cnpj: fornecedorForm.cnpj,
                            contato: fornecedorForm.contato,
                            telefone: fornecedorForm.telefone,
                            email: fornecedorForm.email,
                            frete: Number(fornecedorForm.frete || 0),
                            usuario_email: session.value?.user?.email
