                        closeFornecedorModal();
                        await loadFornecedores(fornecedoresTable.pagination.page || 1);
                        await ensureFornecedorOptions();
                    } catch (error) {
                        errorMessage.value = error.message || String(error);
                    } finally {
                        fornecedorModal.loading = false;
                    }
                };

                const softDeleteFornecedor = async (item) => {
                    const uuid = String(item?.uuid || '').trim();
                    if (!uuid) return;
                    const ok = window.confirm(`Confirma inativar o fornecedor ${item.nome_fantasia}?`);
                    if (!ok) return;
                    try {
                        const resp = await runGAS('inactivateFornecedor', {
                            uuid,
                            usuario_email: session.value?.user?.email
                        });
                        if (resp.success === false) throw new Error(resp.message);
                        await loadFornecedores(fornecedoresTable.pagination.page || 1);
                        await ensureFornecedorOptions();
                    } catch (error) {
                        errorMessage.value = error.message || String(error);
                    }
                };

                const loadCompras = async () => {
                    moduleLoading.value = true;
                    const resp = await runGAS('getExecutiveSummary', {});
                    if (resp.success === false) throw new Error(resp.message);
                    moduleData.compras = resp;
                    moduleLoading.value = false;
                };

                const loadUploadHistory = async () => {
                    if (typeof google === 'undefined' || !google?.script?.run) return;
                    const resp = await runGAS('getUploadHistory', 30);
                    if (resp.success === false) throw new Error(resp.message);
                    uploadHistory.value = resp.data || [];
                };

                const loadMovimentacoesTable = async (page = 1) => {
                    movimentacoesTable.loading = true;
                    try {
                        const resp = await runGAS('listMovimentacoes', { page, pageSize: 20 });
                        if (resp.success === false) throw new Error(resp.message);
                        movimentacoesTable.rows = resp.data || [];
                        movimentacoesTable.pagination = resp.pagination || { page: 1, pageSize: 20, total: 0, totalPages: 1 };
                    } finally {
                        movimentacoesTable.loading = false;
                    }
                };
                const deleteMovimentacaoRow = async (row) => {
                    const uuid = String(row?.uuid || '').trim();
                    if (!uuid) {
                        throw new Error('UUID da movimentação inválido para exclusão.');
                    }

                    const confirmed = window.confirm(`Confirma excluir a movimentação ${row.codigo_ax || ''} (${formatDateBr(row.data_iso)})?`);
                    if (!confirmed) return;

                    movimentacoesTable.deletingUuid = uuid;
                    try {
                        const resp = await runGAS('deleteMovimentacao', {
                            uuid,
                            usuario_email: session.value?.user?.email
                        });
                        if (resp.success === false) throw new Error(resp.message);
                        await loadMovimentacoesTable(movimentacoesTable.pagination.page || 1);
                    } catch (error) {
                        errorMessage.value = error.message || String(error);
                    } finally {
                        movimentacoesTable.deletingUuid = '';
                    }
                };


                const goToMovimentacoesPage = async (page) => {
                    const nextPage = Math.max(1, Number(page || 1));
                    await loadMovimentacoesTable(nextPage);
                };

                const goToMovimentacoesFirstPage = async () => {
                    await loadMovimentacoesTable(1);
                };

                const goToMovimentacoesLastPage = async () => {
                    const last = Number(movimentacoesTable.pagination.totalPages || 1);
                    await loadMovimentacoesTable(last);
                };

                const formatDateBr = (isoValue) => {
                    const dt = new Date(isoValue);
                    if (Number.isNaN(dt.getTime())) return '-';
                    return dt.toLocaleString('pt-BR');
                };

                const formatQuantityBr = (value) => Number(value || 0).toLocaleString('pt-BR', {
                    minimumFractionDigits: 0,
                    maximumFractionDigits: 2
                });

                const sanitizeNumberUi = (value) => {
                    const n = Number(value || 0);
                    return Number.isFinite(n) ? n.toLocaleString('pt-BR') : '0';
                };

                const normalizeAx = (value) => String(value || '').trim();

                const ensureInsumosLookupCache = async (forceRefresh = false) => {
                    const ttlMs = 5 * 60 * 1000;
                    const fresh = insumosLookupCache.loaded && (Date.now() - insumosLookupCache.loadedAt) < ttlMs;
                    if (!forceRefresh && fresh) return;
                    if (insumosLookupCache.loading) return;

                    insumosLookupCache.loading = true;
                    try {
                        const resp = await runGAS('getInsumosData', {});
                        if (resp.success === false) throw new Error(resp.message);

                        const data = Array.isArray(resp.data) ? resp.data : [];
                        const map = {};
                        data.forEach(item => {
                            const ax = normalizeAx(item.codigo_ax);
                            if (!ax) return;
                            map[ax] = {
                                codigo_ax: ax,
                                descricao: String(item.descricao || ''),
                                uuid: String(item.uuid || '')
                            };
                        });

                        insumosLookupCache.byCodigo = map;
                        insumosLookupCache.loaded = true;
                        insumosLookupCache.loadedAt = Date.now();
                    } finally {
                        insumosLookupCache.loading = false;
                    }
                };

                const getInsumoByCodigoFromCache = (codigoAx) => {
                    const ax = normalizeAx(codigoAx);
                    if (!ax) return null;
                    return insumosLookupCache.byCodigo[ax] || null;
                };

                const loadCurrentModule = async () => {
                    try {
                        errorMessage.value = '';
                        if (!session.value) return;
                        if (typeof google === 'undefined' || !google?.script?.run) return;

                        if (currentPage.value === 'dashboard') await loadDashboard();
                        if (currentPage.value === 'insumos') {
                            await loadInsumos();
                            await ensureFornecedorOptions();
                        }
                        if (currentPage.value === 'fornecedores') {
                            await loadFornecedores();
                        }
                        if (currentPage.value === 'compras') await loadCompras();
                        if (currentPage.value === 'movimentacoes') {
                            await loadUploadHistory();
                            await loadMovimentacoesTable(1);
                            await ensureInsumosLookupCache();
                        }
                    } catch (error) {
                        moduleLoading.value = false;
                        errorMessage.value = error.message || String(error);
                    }
                };

                const debounce = (fn, waitMs = 250) => {
                    let timer = null;
                    return (...args) => {
                        clearTimeout(timer);
                        timer = setTimeout(() => fn(...args), waitMs);
                    };
                };

                const loadCurrentModuleDebounced = debounce(() => {
                    loadCurrentModule();
                }, 250);

                const goToPage = async (page) => {
                    if (!session.value?.user?.allowed_pages?.includes(page)) {
                        errorMessage.value = `Acesso negado para a página ${page}.`;
                        return;
                    }
                    errorMessage.value = '';
                    currentPage.value = page;
                    loadCurrentModuleDebounced();
                };

                const handleLoginSuccess = async (response) => {
                    loading.value = false;
                    if (!response || response.success === false) {
                        errorMessage.value = response?.message || 'Falha na autenticação.';
                        return;
                    }
                    errorMessage.value = '';
                    session.value = response;
                    currentPage.value = response.user.landing_page || response.user.allowed_pages?.[0] || 'dashboard';
                    form.password = '';
                    await refreshIcons();
                    ensureInsumosLookupCache().catch(() => {});
                    loadCurrentModuleDebounced();
                };

                const handleLoginError = (error) => {
                    loading.value = false;
                    errorMessage.value = error?.message || String(error) || 'Falha na autenticação.';
                };

                const handleLogin = () => {
                    loading.value = true;
                    errorMessage.value = '';

                    if (typeof google !== 'undefined' && google?.script?.run) {
                        runGAS('doLogin', { email: form.email, password: form.password })
                            .then(handleLoginSuccess)
                            .catch(handleLoginError);
                        return;
                    }

                    setTimeout(async () => {
                        await handleLoginSuccess({
                            success: true,
                            user: {
                                nome: 'Usuário Preview',
                                email: 'preview@apollo.com',
                                role: 'ADMIN',
                                allowed_pages: ['dashboard', 'insumos', 'fornecedores', 'movimentacoes', 'compras', 'configuracoes'],
                                landing_page: 'dashboard'
                            }
                        });
                    }, 500);
                };

                const submitMovimentacao = async () => {
                    try {
                        moduleLoading.value = true;
                        errorMessage.value = '';
                        const payload = {
                            codigo_ax: movForm.codigo_ax,
                            tipo: movForm.tipo,
                            quantidade: movForm.quantidade,
                            observacao: movForm.observacao,
                            usuario_email: session.value?.user?.email
                        };
                        const resp = await runGAS('updateStockLevel', payload);
                        if (resp.success === false) throw new Error(resp.message);
                        const ax = movForm.codigo_ax;
                        closeManualModal();
                        await loadMovimentacoesTable(1);
                        loadCurrentModuleDebounced();
                        openSuccessModal('Movimentação registrada com sucesso', `Código AX: ${ax} | Tipo: ${payload.tipo} | Quantidade: ${payload.quantidade}`);
                    } catch (error) {
                        errorMessage.value = error.message || String(error);
                    } finally {
                        moduleLoading.value = false;
                    }
                };

                const openBulkModal = () => {
                    bulkModal.open = true;
                    bulkModal.data_iso = new Date().toISOString().slice(0, 10);
                };

                const closeBulkModal = () => {
                    Object.assign(bulkModal, createBulkModalState());
                };

                const openManualModal = () => {
                    manualModal.open = true;
                    ensureInsumosLookupCache().catch(() => {});
                };

                const closeManualModal = () => {
                    manualModal.open = false;
                    Object.assign(movForm, createMovFormState());
                };

                const resolveManualInsumo = async () => {
                    try {
                        const codigo = normalizeAx(movForm.codigo_ax);
                        movForm.descricao = '';
                        if (!codigo) return;

                        let found = getInsumoByCodigoFromCache(codigo);
                        if (!found) {
                            await ensureInsumosLookupCache();
                            found = getInsumoByCodigoFromCache(codigo);
                        }

                        if (!found) {
                            const resp = await runGAS('getInsumosData', { query: codigo });
                            if (resp.success === false) throw new Error(resp.message);
                            const data = Array.isArray(resp.data) ? resp.data : [];
                            const exact = data.find(item => normalizeAx(item.codigo_ax) === codigo);
                            if (exact) {
                                found = {
                                    codigo_ax: normalizeAx(exact.codigo_ax),
                                    descricao: String(exact.descricao || ''),
                                    uuid: String(exact.uuid || '')
                                };
                                insumosLookupCache.byCodigo[found.codigo_ax] = found;
                            }
                        }

                        if (found) {
                            movForm.codigo_ax = found.codigo_ax;
                            movForm.descricao = found.descricao;
                        }
                    } catch (error) {
                        errorMessage.value = error.message || String(error);
                    }
                };

                const openProcessModal = (title, message) => {
                    processModal.open = true;
                    processModal.title = title;
                    processModal.message = message;
                };

                const closeProcessModal = () => {
                    processModal.open = false;
                    processModal.title = '';
                    processModal.message = '';
                };

                const openSuccessModal = (title, message) => {
                    successModal.open = true;
                    successModal.title = title;
                    successModal.message = message;
                };

                const closeSuccessModal = () => {
                    successModal.open = false;
                    successModal.title = '';
                    successModal.message = '';
                };

                const parseBulkText = (text) => {
                    const lines = String(text || '').split(/\r?\n/).map(l => l.trim()).filter(Boolean);
                    if (!lines.length) return [];

                    const parsed = lines.map(line => line.split(/[\t;,]/).map(v => String(v || '').trim()));
                    const first = parsed[0] || [];
                    const hasHeader = String(first[0] || '').toLowerCase() === 'codigo_ax' || String(first[1] || '').toLowerCase() === 'quantidade';
                    const body = hasHeader ? parsed.slice(1) : parsed;

                    return body
                        .filter(cols => cols[0] && cols[1])
                        .map(cols => ({ codigo_ax: cols[0], quantidade: String(cols[1]).replace(',', '.') }));
                };

                const parseBulkSheetRows = (rows) => {
                    if (!Array.isArray(rows) || !rows.length) return [];

                    const normalized = rows
                        .map(r => [String((r?.[0] ?? '')).trim(), String((r?.[1] ?? '')).trim()])
                        .filter(r => r[0] || r[1]);

                    if (!normalized.length) return [];

                    const hasHeader = normalized[0][0].toLowerCase() === 'codigo_ax' || normalized[0][1].toLowerCase() === 'quantidade';
                    const body = hasHeader ? normalized.slice(1) : normalized;

                    return body
                        .filter(cols => cols[0] && cols[1])
                        .map(cols => ({
                            codigo_ax: cols[0],
                            quantidade: String(cols[1]).replace(',', '.')
                        }));
                };

                const parseExcelFile = async (file) => {
                    if (typeof XLSX === 'undefined') {
                        throw new Error('Leitor de Excel não carregado. Recarregue a página e tente novamente.');
                    }

                    const buffer = await file.arrayBuffer();
                    const workbook = XLSX.read(buffer, { type: 'array' });
                    const firstSheet = workbook.SheetNames[0];
                    if (!firstSheet) return [];

                    const worksheet = workbook.Sheets[firstSheet];
                    const rows = XLSX.utils.sheet_to_json(worksheet, {
                        header: 1,
                        raw: false,
                        defval: ''
                    });

                    return parseBulkSheetRows(rows);
                };

                const onBulkFileChange = async (event) => {
                    try {
                        bulkModal.loading = true;
                        const file = event.target.files?.[0];
                        if (!file) return;
                        bulkModal.fileName = file.name;

                        const extension = file.name.toLowerCase().split('.').pop();
                        if (['xls', 'xlsx', 'xlsm'].includes(extension)) {
                            bulkModal.rawRows = await parseExcelFile(file);
                        } else {
                            const text = await file.text();
                            bulkModal.rawRows = parseBulkText(text);
                        }

                        bulkModal.previewRows = [];
                        if (!bulkModal.rawRows.length) {
                            throw new Error('Arquivo sem linhas válidas. Use colunas A|B = codigo_ax|quantidade.');
                        }
                    } catch (error) {
                        errorMessage.value = error.message || String(error);
                    } finally {
                        bulkModal.loading = false;
                    }
                };

                const prepareBulkUpload = async () => {
                    try {
                        bulkModal.loading = true;
                        errorMessage.value = '';
                        const resp = await runGAS('prepareBulkMovimentacao', {
                            rows: bulkModal.rawRows,
                            usuario_email: session.value?.user?.email,
                            data_iso: bulkModal.data_iso,
                            tipo: bulkModal.tipo
                        });
                        if (resp.success === false) throw new Error(resp.message);
                        bulkModal.previewRows = resp.rows || [];
                    } catch (error) {
                        errorMessage.value = error.message || String(error);
                    } finally {
                        bulkModal.loading = false;
                    }
                };

                const generateClientUUID = () => {
                    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                        const r = (Math.random() * 16) | 0;
                        const v = c === 'x' ? r : (r & 0x3) | 0x8;
                        return v.toString(16);
                    });
                };

                const saveBulkUpload = async () => {
                    try {
                        bulkModal.loading = true;
                        errorMessage.value = '';

                        const sanitizedRows = bulkModal.previewRows.map(row => ({
                            ...row,
                            quantidade: Number(row.quantidade),
                            valid: !!row.insumo_id && Number(row.quantidade) > 0,
                            error: (!row.insumo_id ? 'Código AX não encontrado.' : (Number(row.quantidade) > 0 ? '' : 'Quantidade inválida'))
                        }));

                        const requestId = generateClientUUID();
                        const payload = {
                            request_id: requestId,
                            rows: sanitizedRows,
                            usuario_email: session.value?.user?.email,
                            data_iso: bulkModal.data_iso,
                            tipo: bulkModal.tipo,
                            observacao: bulkModal.observacao,
                            file_name: bulkModal.fileName
                        };

                        openProcessModal('Processando upload em lote', 'Validando itens e registrando movimentações...');

                        let resp = null;
                        for (let attempt = 0; attempt < 6; attempt += 1) {
                            try {
                                processModal.message = `Processando requisição (${attempt + 1}/6)...`;
                                resp = await runGAS('saveBulkMovimentacao', payload);
                                if (resp.success === false) throw new Error(resp.message);
                                break;
                            } catch (error) {
                                const msg = error?.message || String(error);
                                if (msg.includes('já em processamento') && attempt < 5) {
                                    processModal.message = 'Requisição em processamento no servidor. Sincronizando resultado...';
                                    await sleep(1200);
                                    continue;
                                }
                                throw error;
                            }
                        }

                        if (!resp) {
                            throw new Error('Não foi possível obter confirmação do upload. Tente novamente em alguns segundos.');
                        }

                        closeProcessModal();
                        closeBulkModal();
                        await loadMovimentacoesTable(1);
                        loadCurrentModuleDebounced();
                        openSuccessModal('Upload concluído com sucesso', `ID: ${resp.upload_id} | Movimentos: ${resp.total_movimentos}`);
                    } catch (error) {
                        closeProcessModal();
                        errorMessage.value = error.message || String(error);
                    } finally {
                        bulkModal.loading = false;
                    }
                };

                const runSeedFornecedores = async () => {
                    try {
                        const resp = await runGAS('seedFornecedoresFromInsumos');
                        if (resp.success === false) throw new Error(resp.message);
                        errorMessage.value = `Seed executado: ${resp.fornecedores_criados} fornecedores criados.`;
                    } catch (error) {
                        errorMessage.value = error.message || String(error);
                    }
                };

                const runBackupSnapshot = async () => {
                    try {
                        const resp = await runGAS('runWeeklyBackupSnapshot');
                        if (resp.success === false) throw new Error(resp.message);
                        errorMessage.value = `Snapshot gerado: ${resp.snapshot_id}`;
                    } catch (error) {
                        errorMessage.value = error.message || String(error);
                    }
                };

                const runBackendTests = async () => {
                    try {
                        const resp = await runGAS('test_runAllCalculations');
                        if (resp.success === false) throw new Error(resp.message);
                        errorMessage.value = resp.message;
                    } catch (error) {
                        errorMessage.value = error.message || String(error);
                    }
                };

                const logout = async () => {
                    session.value = null;
                    currentPage.value = 'dashboard';
                    errorMessage.value = '';
                    form.password = '';
                    Object.assign(moduleData, createModuleState());
                    uploadHistory.value = [];
                    insumosTable.rows = [];
                    insumosTable.pagination = { page: 1, pageSize: 20, total: 0, totalPages: 1 };
                    fornecedoresTable.rows = [];
                    fornecedoresTable.pagination = { page: 1, pageSize: 20, total: 0, totalPages: 1 };
                    movimentacoesTable.rows = [];
                    movimentacoesTable.pagination = { page: 1, pageSize: 20, total: 0, totalPages: 1 };
                    movimentacoesTable.deletingUuid = '';
                    insumosLookupCache.loaded = false;
                    insumosLookupCache.loadedAt = 0;
                    insumosLookupCache.byCodigo = {};
                    dashboardCache.byKey = {};
                    destroyDashboardCharts();
                    closeBulkModal();
                    closeManualModal();
                    closeInsumoModal();
                    closeFornecedorModal();
                    fornecedorOptions.value = [];
                    await refreshIcons();
                };

                onMounted(refreshIcons);

                return {
                    form,
                    DASHBOARD_MAX_ROWS,
                    dashboardFilters,
                    dashboardYearOptions,
                    dashboardMonthOptions,
                    dashboardChartsEnabled,
                    dashboardChartsState,
                    dashboardRows,
                    dashboardRowsLimited,
                    loading,
                    moduleLoading,
                    errorMessage,
                    session,
                    currentPage,
                    pageContent,
                    moduleData,
                    insumosQuery,
                    insumosStatus,
                    fornecedoresQuery,
                    fornecedoresStatus,
                    insumosTable,
                    fornecedoresTable,
                    insumoForm,
                    insumoModal,
                    fornecedorForm,
                    fornecedorModal,
                    fornecedorOptions,
                    movForm,
                    manualModal,
                    uploadHistory,
                    movimentacoesTable,
                    bulkModal,
                    processModal,
                    successModal,
                    isAuthenticated,
                    handleLogin,
                    logout,
                    goToPage,
                    loadCurrentModule,
                    applyDashboardFilters,
                    loadInsumos,
                    goToInsumosPage,
                    loadFornecedores,
                    goToFornecedoresPage,
                    openInsumoCreateModal,
                    openInsumoEditModal,
                    closeInsumoModal,
                    saveInsumoForm,
                    softDeleteInsumo,
                    openFornecedorCreateModal,
                    openFornecedorEditModal,
                    closeFornecedorModal,
                    saveFornecedorForm,
                    softDeleteFornecedor,
                    submitMovimentacao,
                    openManualModal,
                    closeManualModal,
                    resolveManualInsumo,
                    openBulkModal,
                    closeBulkModal,
                    closeSuccessModal,
                    goToMovimentacoesPage,
                    goToMovimentacoesFirstPage,
                    goToMovimentacoesLastPage,
                    deleteMovimentacaoRow,
                    formatDateBr,
                    formatQuantityBr,
                    sanitizeNumberUi,
                    onBulkFileChange,
                    prepareBulkUpload,
                    saveBulkUpload,
                    runSeedFornecedores,
                    runBackupSnapshot,
                    runBackendTests
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
