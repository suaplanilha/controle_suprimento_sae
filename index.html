<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suprimentos - Gestão de Estoque</title>
    <!-- Tailwind CSS para utilitários -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SheetJS para leitura de Excel (.xls/.xlsx) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        :root {
            --azul-escuro: #0f172a;
            --azul-medio: #1e293b;
            --azul-claro: #38bdf8;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--azul-escuro);
            color: #f8fafc;
            overflow: hidden;
        }

        /* Animação de fundo flutuante */
        .bg-blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.12) 0%, rgba(15, 23, 42, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(80px);
            animation: move 25s infinite alternate ease-in-out;
        }

        @keyframes move {
            0% { transform: translate(-20%, -20%) scale(1); }
            100% { transform: translate(30%, 30%) scale(1.1); }
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .side-image {
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            position: relative;
            overflow: hidden;
        }

        /* Overlay de Suprimentos/Estoque */
        .inventory-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=1470&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            opacity: 0.1;
            mix-blend-mode: overlay;
        }

        /* ANIMAÇÃO DE FLUXO DE SUPRIMENTOS */
        .supply-node {
            position: absolute;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 12px;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            animation: float-supply 10s infinite linear;
            opacity: 0;
        }

        @keyframes float-supply {
            0% { transform: translateY(100px) translateX(-20px); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-150px) translateX(20px); opacity: 0; }
        }

        .node-1 { left: 10%; animation-delay: 0s; }
        .node-2 { right: 15%; animation-delay: 3s; animation-duration: 12s; }
        .node-3 { left: 40%; animation-delay: 6s; animation-duration: 8s; }

        input:focus {
            outline: none;
            border-color: var(--azul-claro);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.4);
            filter: brightness(1.1);
        }

        @media (max-width: 768px) {
            .side-content { display: none; }
            .login-container { grid-template-columns: 1fr; }
        }

        .animate-slide-up {
            animation: slideUp 0.8s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="app" class="min-h-screen bg-slate-950 text-slate-100">
        <template v-if="!isAuthenticated">
            <div class="min-h-screen flex items-center justify-center p-4 relative">
                <div class="bg-blob"></div>

                <div class="login-container grid grid-cols-2 w-full max-w-6xl h-[650px] glass-card rounded-[2rem] overflow-hidden animate-slide-up">
                    <div class="side-content side-image flex flex-col justify-between p-16">
                        <div class="inventory-overlay"></div>

                        <div class="relative z-10">
                            <p class="text-xs uppercase tracking-[0.25em] text-slate-400 font-semibold mb-4">SKU-482 In</p>
                            <h1 class="text-4xl md:text-5xl font-black text-white leading-tight mb-6">Confirmado<br/>Enviado<br/><span class="text-sky-400">Suprimentos</span></h1>
                            <p class="text-slate-300/90 max-w-md text-sm">Sistema inteligente para controle de estoque, logística e fluxo de materiais.</p>
                        </div>

                        <div class="relative z-10">
                            <div class="flex items-center gap-4 mb-2">
                                <div class="w-10 h-10 rounded-xl bg-slate-800/70 border border-slate-600/40 flex items-center justify-center">
                                    <i data-lucide="shield-check" class="w-5 h-5 text-slate-400"></i>
                                </div>
                                <div>
                                    <p class="text-[10px] text-slate-500 uppercase tracking-[0.2em] font-bold">Gestão Geral</p>
                                    <p class="text-base text-white font-semibold">Denilson Almeida</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 mt-8">
                                <div class="w-2 h-2 bg-sky-500 rounded-full animate-pulse"></div>
                                <div class="text-slate-500 text-[10px] uppercase tracking-[0.3em] font-bold">Enterprise System v2.0</div>
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col justify-center p-12 md:p-20 bg-slate-900/40 backdrop-blur-md">
                        <div class="w-full max-w-sm mx-auto">
                            <div class="mb-12">
                                <div class="inline-block md:hidden mb-6">
                                    <h1 class="text-2xl font-black text-sky-400 uppercase">Suprimentos</h1>
                                </div>
                                <h2 class="text-3xl font-bold text-white mb-3">Autenticação</h2>
                                <p class="text-slate-400 font-light">Insira suas credenciais para gerenciar o estoque.</p>
                            </div>

                            <form @submit.prevent="handleLogin" class="space-y-6">
                                <div class="space-y-2">
                                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">ID de Acesso / E-mail</label>
                                    <div class="relative group">
                                        <span class="absolute left-4 top-3.5 text-slate-500 transition-colors group-focus-within:text-sky-400">
                                            <i data-lucide="user-circle" class="w-5 h-5"></i>
                                        </span>
                                        <input v-model="form.email" type="text" placeholder="denilson@suprimentos.com" class="w-full bg-slate-800/40 border border-slate-700/50 text-white rounded-2xl py-4 pl-12 pr-4 transition-all duration-300" required>
                                    </div>
                                </div>

                                <div class="space-y-2">
                                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Senha Operacional</label>
                                    <div class="relative group">
                                        <span class="absolute left-4 top-3.5 text-slate-500 transition-colors group-focus-within:text-sky-400">
                                            <i data-lucide="key" class="w-5 h-5"></i>
                                        </span>
                                        <input v-model="form.password" type="password" placeholder="••••••••" class="w-full bg-slate-800/40 border border-slate-700/50 text-white rounded-2xl py-4 pl-12 pr-4 transition-all duration-300" required>
                                    </div>
                                </div>

                                <p v-if="errorMessage" class="text-red-300 bg-red-900/30 border border-red-500/40 rounded-xl px-4 py-3 text-sm">{{ errorMessage }}</p>

                                <button type="submit" :disabled="loading" class="btn-primary w-full text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3 group disabled:opacity-50 disabled:cursor-not-allowed mt-4">
                                    <span v-if="loading" class="animate-spin rounded-full h-5 w-5 border-2 border-white/30 border-t-white"></span>
                                    <span v-else>Entrar no Sistema</span>
                                    <i v-if="!loading" data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <template v-else>
            <div class="min-h-screen flex">
                <aside class="w-72 border-r border-slate-800 bg-slate-900/70 p-6 flex flex-col">
                    <h1 class="text-xl font-black text-sky-400 uppercase mb-1">Suprimentos</h1>
                    <p class="text-xs text-slate-500 mb-8">Enterprise System v2.0</p>

                    <p class="text-xs uppercase tracking-wider text-slate-500 font-semibold mb-3">Páginas permitidas</p>
                    <div class="space-y-2 flex-1">
                        <button
                            v-for="page in session.user.allowed_pages"
                            :key="page"
                            @click="goToPage(page)"
                            class="w-full text-left px-3 py-2 rounded-xl border transition-all"
                            :class="currentPage === page ? 'border-sky-400 bg-sky-500/20 text-sky-300' : 'border-slate-700/70 bg-slate-800/40 text-slate-200 hover:border-slate-500'"
                        >
                            {{ page }}
                        </button>
                    </div>

                    <button @click="logout" class="mt-6 w-full border border-slate-700 text-slate-200 hover:bg-slate-800/50 font-semibold py-3 rounded-2xl">Sair</button>
                </aside>

                <main class="flex-1 p-8 md:p-10">
                    <div class="mb-8 flex items-center justify-between">
                        <div>
                            <h2 class="text-3xl font-bold text-white">Olá, {{ session.user.nome }}</h2>
                            <p class="text-slate-400">Perfil {{ session.user.role }} | Página ativa: <span class="text-sky-400">{{ currentPage }}</span></p>
                        </div>
                    </div>

                    <p v-if="errorMessage" class="mb-6 text-red-300 bg-red-900/30 border border-red-500/40 rounded-xl px-4 py-3 text-sm">{{ errorMessage }}</p>

                    <section class="glass-card rounded-3xl p-8 min-h-[320px] space-y-6">
                        <div class="flex items-center justify-between">
                            <h3 class="text-xl font-semibold text-white">Módulo {{ currentPage }}</h3>
                            <button @click="loadCurrentModule" class="text-xs px-3 py-2 rounded-lg border border-slate-600 text-slate-200 hover:bg-slate-800/50">Atualizar</button>
                        </div>

                        <template v-if="moduleLoading">
                            <p class="text-slate-400">Carregando dados do módulo...</p>
                        </template>

                        <template v-else-if="currentPage === 'dashboard'">
                            <div class="grid md:grid-cols-4 gap-4">
                                <div class="p-4 rounded-xl bg-slate-800/50 border border-slate-700"><p class="text-xs text-slate-400">Total Itens</p><p class="text-2xl font-bold">{{ moduleData.dashboard?.summary?.total ?? '-' }}</p></div>
                                <div class="p-4 rounded-xl bg-slate-800/50 border border-slate-700"><p class="text-xs text-slate-400">Críticos</p><p class="text-2xl font-bold text-red-300">{{ moduleData.dashboard?.summary?.criticos ?? '-' }}</p></div>
                                <div class="p-4 rounded-xl bg-slate-800/50 border border-slate-700"><p class="text-xs text-slate-400">Em Alerta</p><p class="text-2xl font-bold text-amber-300">{{ moduleData.dashboard?.summary?.em_alerta ?? '-' }}</p></div>
                                <div class="p-4 rounded-xl bg-slate-800/50 border border-slate-700"><p class="text-xs text-slate-400">Saudáveis</p><p class="text-2xl font-bold text-emerald-300">{{ moduleData.dashboard?.summary?.saudaveis ?? '-' }}</p></div>
                            </div>
                            <p class="text-slate-300">{{ pageContent[currentPage] }}</p>
                        </template>

                        <template v-else-if="currentPage === 'insumos'">
                            <div class="flex gap-3">
                                <input v-model="insumosQuery" @input="loadInsumos" placeholder="Buscar AX ou descrição" class="flex-1 bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2" />
                            </div>
                            <div class="max-h-80 overflow-auto border border-slate-700 rounded-xl">
                                <table class="w-full text-sm">
                                    <thead class="bg-slate-900/60 text-slate-300"><tr><th class="p-2 text-left">AX</th><th class="p-2 text-left">Descrição</th><th class="p-2">Categoria</th><th class="p-2">Saldo</th><th class="p-2">Status</th></tr></thead>
                                    <tbody>
                                        <tr v-for="item in (moduleData.insumos?.data || [])" :key="item.uuid" class="border-t border-slate-800">
                                            <td class="p-2">{{ item.codigo_ax }}</td><td class="p-2">{{ item.descricao }}</td><td class="p-2 text-center">{{ item.categoria }}</td><td class="p-2 text-center">{{ item.saldo_atual }}</td><td class="p-2 text-center">{{ item.status_estoque }}</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </template>

                        <template v-else-if="currentPage === 'movimentacoes'">
                            <div class="flex items-center justify-between">
                                <p class="text-slate-300 text-sm">Operação manual e upload em massa de movimentações.</p>
                                <button @click="openBulkModal" class="btn-primary rounded-xl px-4 py-2 text-sm">Upload em Massa</button>
                            </div>

                            <form @submit.prevent="submitMovimentacao" class="grid md:grid-cols-5 gap-3">
                                <input v-model="movForm.codigo_ax" placeholder="Código AX do Insumo" class="bg-slate-900/50 border border-slate-700 rounded-xl px-3 py-2" required />
                                <select v-model="movForm.tipo" class="bg-slate-900/50 border border-slate-700 rounded-xl px-3 py-2"><option>ENTRADA</option><option>SAIDA</option><option>AJUSTE</option></select>
                                <input v-model="movForm.quantidade" type="number" step="0.01" placeholder="Quantidade" class="bg-slate-900/50 border border-slate-700 rounded-xl px-3 py-2" required />
                                <input v-model="movForm.observacao" placeholder="Observação" class="bg-slate-900/50 border border-slate-700 rounded-xl px-3 py-2" />
                                <button :disabled="moduleLoading" class="btn-primary rounded-xl px-3 py-2 disabled:opacity-50">Registrar</button>
                            </form>

                            <div class="border border-slate-700 rounded-xl p-3">
                                <p class="text-xs uppercase text-slate-500 mb-2">Histórico de uploads</p>
                                <div class="max-h-48 overflow-auto text-sm">
                                    <div v-for="item in uploadHistory" :key="item.uuid" class="border-b border-slate-800 py-2 flex justify-between">
                                        <span>{{ item.criado_em }} | {{ item.tipo }} | {{ item.total_validas }}/{{ item.total_linhas }}</span>
                                        <span class="text-slate-400">{{ item.arquivo_nome || 'manual' }}</span>
                                    </div>
                                    <p v-if="!uploadHistory.length" class="text-slate-500">Sem uploads registrados.</p>
                                </div>
                            </div>

                            <p class="text-slate-400 text-sm">A auditoria (saldo anterior/posterior) é registrada automaticamente no backend.</p>

                            <div v-if="bulkModal.open" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                                <div class="w-full max-w-5xl bg-slate-900 border border-slate-700 rounded-2xl p-5 space-y-4 max-h-[90vh] overflow-auto">
                                    <div class="flex items-center justify-between">
                                        <h4 class="text-lg font-semibold">Upload em Massa - Movimentações</h4>
                                        <button @click="closeBulkModal" class="text-slate-400 hover:text-white">✕</button>
                                    </div>

                                    <div class="grid md:grid-cols-4 gap-3">
                                        <input type="file" @change="onBulkFileChange" accept=".csv,.txt,.xls,.xlsx,.xlsm" class="bg-slate-800/60 border border-slate-700 rounded-xl px-3 py-2" />
                                        <input type="date" v-model="bulkModal.data_iso" class="bg-slate-800/60 border border-slate-700 rounded-xl px-3 py-2" />
                                        <select v-model="bulkModal.tipo" class="bg-slate-800/60 border border-slate-700 rounded-xl px-3 py-2"><option>SAIDA</option><option>ENTRADA</option><option>AJUSTE</option></select>
                                        <button @click="prepareBulkUpload" :disabled="bulkModal.loading || !bulkModal.rawRows.length" class="btn-primary rounded-xl px-3 py-2 disabled:opacity-50">Pré-visualizar</button>
                                    </div>

                                    <p class="text-xs text-slate-400">Formato esperado: A|B = codigo_ax|quantidade. Pode conter header ou linhas diretas.</p>
                                    <p v-if="bulkModal.fileName" class="text-xs text-sky-300">Arquivo selecionado: {{ bulkModal.fileName }}</p>

                                    <div v-if="bulkModal.previewRows.length" class="space-y-3">
                                        <div class="text-sm text-slate-300">Válidas: {{ bulkModal.previewRows.filter(r => r.valid).length }} | Inválidas: {{ bulkModal.previewRows.filter(r => !r.valid).length }}</div>
                                        <div class="max-h-72 overflow-auto border border-slate-700 rounded-xl">
                                            <table class="w-full text-sm">
                                                <thead class="bg-slate-900/80"><tr><th class="p-2 text-left">Código AX</th><th class="p-2 text-left">Nome</th><th class="p-2 text-left">Quantidade</th><th class="p-2 text-left">Status</th></tr></thead>
                                                <tbody>
                                                    <tr v-for="(row,idx) in bulkModal.previewRows" :key="idx" class="border-t border-slate-800">
                                                        <td class="p-2">{{ row.codigo_ax }}</td>
                                                        <td class="p-2">{{ row.descricao }}</td>
                                                        <td class="p-2"><input v-model="row.quantidade" type="number" step="0.01" class="w-28 bg-slate-800 border border-slate-700 rounded px-2 py-1" /></td>
                                                        <td class="p-2" :class="row.valid ? 'text-emerald-300' : 'text-red-300'">{{ row.valid ? 'OK' : row.error }}</td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>

                                        <div class="grid md:grid-cols-2 gap-3">
                                            <input v-model="bulkModal.observacao" placeholder="Observação para todo o lote" class="bg-slate-800/60 border border-slate-700 rounded-xl px-3 py-2" />
                                            <div class="flex gap-2 justify-end">
                                                <button @click="closeBulkModal" class="border border-slate-600 rounded-xl px-4 py-2">Cancelar</button>
                                                <button @click="saveBulkUpload" :disabled="bulkModal.loading" class="btn-primary rounded-xl px-4 py-2 disabled:opacity-50">Salvar Lote</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            <div v-if="processModal.open" class="fixed inset-0 bg-black/75 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
                                <div class="w-full max-w-md bg-slate-900 border border-slate-700 rounded-2xl p-6 space-y-4">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 rounded-full border-2 border-sky-400 border-t-transparent animate-spin"></div>
                                        <div>
                                            <h4 class="text-lg font-semibold">{{ processModal.title }}</h4>
                                            <p class="text-sm text-slate-300">{{ processModal.message }}</p>
                                        </div>
                                    </div>
                                    <div class="text-xs text-slate-400 bg-slate-800/60 border border-slate-700 rounded-xl px-3 py-2">
                                        Não feche esta tela. O sistema está garantindo idempotência e consistência do estoque.
                                    </div>
                                </div>
                            </div>

                            <div v-if="successModal.open" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
                                <div class="w-full max-w-md bg-slate-900 border border-emerald-600/50 rounded-2xl p-6 space-y-4">
                                    <h4 class="text-lg font-semibold text-emerald-300">{{ successModal.title }}</h4>
                                    <p class="text-sm text-slate-200">{{ successModal.message }}</p>
                                    <div class="flex justify-end">
                                        <button @click="closeSuccessModal" class="btn-primary rounded-xl px-4 py-2">Voltar para Movimentações</button>
                                    </div>
                                </div>
                            </div>
                        </template>

                        <template v-else-if="currentPage === 'compras'">
                            <div class="grid md:grid-cols-3 gap-4">
                                <div class="p-4 rounded-xl bg-slate-800/50 border border-slate-700"><p class="text-xs text-slate-400">Volume em Risco</p><p class="text-2xl font-bold">{{ moduleData.compras?.volume_em_risco ?? '-' }}</p></div>
                                <div class="p-4 rounded-xl bg-slate-800/50 border border-slate-700"><p class="text-xs text-slate-400">Itens Críticos</p><p class="text-2xl font-bold">{{ moduleData.compras?.itens_criticos ?? '-' }}</p></div>
                                <div class="p-4 rounded-xl bg-slate-800/50 border border-slate-700"><p class="text-xs text-slate-400">Cobertura (meses)</p><p class="text-2xl font-bold">{{ moduleData.compras?.cobertura_estoque_global_meses ?? '-' }}</p></div>
                            </div>
                        </template>

                        <template v-else-if="currentPage === 'configuracoes'">
                            <div class="space-y-3">
                                <button @click="runSeedFornecedores" class="border border-slate-600 rounded-xl px-4 py-2 hover:bg-slate-800/50">Executar seed de fornecedores</button>
                                <button @click="runBackupSnapshot" class="border border-slate-600 rounded-xl px-4 py-2 hover:bg-slate-800/50">Executar snapshot semanal</button>
                                <button @click="runBackendTests" class="border border-slate-600 rounded-xl px-4 py-2 hover:bg-slate-800/50">Executar teste de cálculo</button>
                            </div>
                        </template>
                    </section>
                </main>
            </div>
        </template>
    </div>

    <script>
        const { createApp, ref, reactive, computed, onMounted, nextTick } = Vue;

        createApp({
            setup() {
                const GAS_CLIENT_CONFIG = Object.freeze({
                    timeoutMs: 20000,
                    retries: 2,
                    backoffBaseMs: 300
                });

                const loading = ref(false);
                const moduleLoading = ref(false);
                const errorMessage = ref('');
                const session = ref(null);
                const currentPage = ref('dashboard');
                const form = reactive({ email: '', password: '' });
                const insumosQuery = ref('');
                const uploadHistory = ref([]);

                const createModuleState = () => ({ dashboard: null, insumos: null, compras: null });
                const moduleData = reactive(createModuleState());

                const movForm = reactive({
                    codigo_ax: '',
                    tipo: 'ENTRADA',
                    quantidade: '',
                    observacao: ''
                });

                const createBulkModalState = () => ({
                    open: false,
                    loading: false,
                    fileName: '',
                    data_iso: '',
                    tipo: 'SAIDA',
                    observacao: '',
                    rawRows: [],
                    previewRows: []
                });
                const bulkModal = reactive(createBulkModalState());
                const processModal = reactive({ open: false, title: '', message: '' });
                const successModal = reactive({ open: false, title: '', message: '' });

                const pageContent = {
                    dashboard: 'Visão executiva com KPIs de estoque crítico e consumo médio.',
                    insumos: 'Cadastro mestre de insumos, lead time e classificação ABC.',
                    movimentacoes: 'Registro e auditoria de entradas, saídas e ajustes de estoque.',
                    compras: 'Lista de ressuprimento e planejamento de compras por criticidade.',
                    configuracoes: 'Parâmetros do sistema e administração de usuários.'
                };

                const isAuthenticated = computed(() => !!session.value);

                const refreshIcons = async () => {
                    await nextTick();
                    lucide.createIcons();
                };

                const pendingQueue = [];
                let queueRunning = false;

                const logCall = (event, payload) => {
                    console.log('[SAE:GAS]', JSON.stringify({ event, at: new Date().toISOString(), ...payload }));
                };

                const withTimeout = (promise, timeoutMs, method) => new Promise((resolve, reject) => {
                    const timer = setTimeout(() => reject(new Error(`Timeout ao chamar ${method} (${timeoutMs}ms)`)), timeoutMs);
                    promise.then((value) => { clearTimeout(timer); resolve(value); }).catch((error) => { clearTimeout(timer); reject(error); });
                });

                const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

                const runGASDirect = (method, ...args) => new Promise((resolve, reject) => {
                    if (typeof google === 'undefined' || !google?.script?.run) {
                        reject(new Error('Ambiente GAS indisponível neste preview.'));
                        return;
                    }
                    google.script.run
                        .withSuccessHandler(resolve)
                        .withFailureHandler(reject)[method](...args);
                });

                const runWithRetry = async (method, args) => {
                    let attempt = 0;
                    while (attempt <= GAS_CLIENT_CONFIG.retries) {
                        try {
                            logCall('request_start', { method, attempt });
                            const response = await withTimeout(runGASDirect(method, ...args), GAS_CLIENT_CONFIG.timeoutMs, method);
                            logCall('request_success', { method, attempt });
                            return response;
                        } catch (error) {
                            logCall('request_error', { method, attempt, error: error?.message || String(error) });
                            if (attempt >= GAS_CLIENT_CONFIG.retries) throw error;
                            const delay = GAS_CLIENT_CONFIG.backoffBaseMs * Math.pow(2, attempt);
                            await sleep(delay);
                        }
                        attempt += 1;
                    }
                };

                const runQueue = async () => {
                    if (queueRunning || !pendingQueue.length) return;
                    queueRunning = true;
                    const next = pendingQueue.shift();
                    try {
                        const response = await runWithRetry(next.method, next.args);
                        next.resolve(response);
                    } catch (error) {
                        next.reject(error);
                    } finally {
                        queueRunning = false;
                        runQueue();
                    }
                };

                const runGAS = (method, ...args) => new Promise((resolve, reject) => {
                    pendingQueue.push({ method, args, resolve, reject });
                    runQueue();
                });

                const loadDashboard = async () => {
                    moduleLoading.value = true;
                    const resp = await runGAS('getDashboardData', {});
                    if (resp.success === false) throw new Error(resp.message);
                    moduleData.dashboard = resp;
                    moduleLoading.value = false;
                };

                const loadInsumos = async () => {
                    moduleLoading.value = true;
                    const resp = await runGAS('getInsumosData', { query: insumosQuery.value });
                    if (resp.success === false) throw new Error(resp.message);
                    moduleData.insumos = resp;
                    moduleLoading.value = false;
                };

                const loadCompras = async () => {
                    moduleLoading.value = true;
                    const resp = await runGAS('getExecutiveSummary', {});
                    if (resp.success === false) throw new Error(resp.message);
                    moduleData.compras = resp;
                    moduleLoading.value = false;
                };

                const loadUploadHistory = async () => {
                    if (typeof google === 'undefined' || !google?.script?.run) return;
                    const resp = await runGAS('getUploadHistory', 30);
                    if (resp.success === false) throw new Error(resp.message);
                    uploadHistory.value = resp.data || [];
                };

                const loadCurrentModule = async () => {
                    try {
                        errorMessage.value = '';
                        if (!session.value) return;
                        if (typeof google === 'undefined' || !google?.script?.run) return;

                        if (currentPage.value === 'dashboard') await loadDashboard();
                        if (currentPage.value === 'insumos') await loadInsumos();
                        if (currentPage.value === 'compras') await loadCompras();
                        if (currentPage.value === 'movimentacoes') await loadUploadHistory();
                    } catch (error) {
                        moduleLoading.value = false;
                        errorMessage.value = error.message || String(error);
                    }
                };

                const debounce = (fn, waitMs = 250) => {
                    let timer = null;
                    return (...args) => {
                        clearTimeout(timer);
                        timer = setTimeout(() => fn(...args), waitMs);
                    };
                };

                const loadCurrentModuleDebounced = debounce(() => {
                    loadCurrentModule();
                }, 250);

                const goToPage = async (page) => {
                    if (!session.value?.user?.allowed_pages?.includes(page)) {
                        errorMessage.value = `Acesso negado para a página ${page}.`;
                        return;
                    }
                    errorMessage.value = '';
                    currentPage.value = page;
                    loadCurrentModuleDebounced();
                };

                const handleLoginSuccess = async (response) => {
                    loading.value = false;
                    if (!response || response.success === false) {
                        errorMessage.value = response?.message || 'Falha na autenticação.';
                        return;
                    }
                    errorMessage.value = '';
                    session.value = response;
                    currentPage.value = response.user.landing_page || response.user.allowed_pages?.[0] || 'dashboard';
                    form.password = '';
                    await refreshIcons();
                    loadCurrentModuleDebounced();
                };

                const handleLoginError = (error) => {
                    loading.value = false;
                    errorMessage.value = error?.message || String(error) || 'Falha na autenticação.';
                };

                const handleLogin = () => {
                    loading.value = true;
                    errorMessage.value = '';

                    if (typeof google !== 'undefined' && google?.script?.run) {
                        runGAS('doLogin', { email: form.email, password: form.password })
                            .then(handleLoginSuccess)
                            .catch(handleLoginError);
                        return;
                    }

                    setTimeout(async () => {
                        await handleLoginSuccess({
                            success: true,
                            user: {
                                nome: 'Usuário Preview',
                                email: 'preview@apollo.com',
                                role: 'ADMIN',
                                allowed_pages: ['dashboard', 'insumos', 'movimentacoes', 'compras', 'configuracoes'],
                                landing_page: 'dashboard'
                            }
                        });
                    }, 500);
                };

                const submitMovimentacao = async () => {
                    try {
                        moduleLoading.value = true;
                        errorMessage.value = '';
                        const payload = {
                            codigo_ax: movForm.codigo_ax,
                            tipo: movForm.tipo,
                            quantidade: movForm.quantidade,
                            observacao: movForm.observacao,
                            usuario_email: session.value?.user?.email
                        };
                        const resp = await runGAS('updateStockLevel', payload);
                        if (resp.success === false) throw new Error(resp.message);
                        movForm.quantidade = '';
                        movForm.observacao = '';
                        loadCurrentModuleDebounced();
                    } catch (error) {
                        errorMessage.value = error.message || String(error);
                    } finally {
                        moduleLoading.value = false;
                    }
                };

                const openBulkModal = () => {
                    bulkModal.open = true;
                    bulkModal.data_iso = new Date().toISOString().slice(0, 10);
                };

                const closeBulkModal = () => {
                    Object.assign(bulkModal, createBulkModalState());
                };

                const openProcessModal = (title, message) => {
                    processModal.open = true;
                    processModal.title = title;
                    processModal.message = message;
                };

                const closeProcessModal = () => {
                    processModal.open = false;
                    processModal.title = '';
                    processModal.message = '';
                };

                const openSuccessModal = (title, message) => {
                    successModal.open = true;
                    successModal.title = title;
                    successModal.message = message;
                };

                const closeSuccessModal = () => {
                    successModal.open = false;
                    successModal.title = '';
                    successModal.message = '';
                };

                const parseBulkText = (text) => {
                    const lines = String(text || '').split(/\r?\n/).map(l => l.trim()).filter(Boolean);
                    if (!lines.length) return [];

                    const parsed = lines.map(line => line.split(/[\t;,]/).map(v => String(v || '').trim()));
                    const first = parsed[0] || [];
                    const hasHeader = String(first[0] || '').toLowerCase() === 'codigo_ax' || String(first[1] || '').toLowerCase() === 'quantidade';
                    const body = hasHeader ? parsed.slice(1) : parsed;

                    return body
                        .filter(cols => cols[0] && cols[1])
                        .map(cols => ({ codigo_ax: cols[0], quantidade: String(cols[1]).replace(',', '.') }));
                };

                const parseBulkSheetRows = (rows) => {
                    if (!Array.isArray(rows) || !rows.length) return [];

                    const normalized = rows
                        .map(r => [String((r?.[0] ?? '')).trim(), String((r?.[1] ?? '')).trim()])
                        .filter(r => r[0] || r[1]);

                    if (!normalized.length) return [];

                    const hasHeader = normalized[0][0].toLowerCase() === 'codigo_ax' || normalized[0][1].toLowerCase() === 'quantidade';
                    const body = hasHeader ? normalized.slice(1) : normalized;

                    return body
                        .filter(cols => cols[0] && cols[1])
                        .map(cols => ({
                            codigo_ax: cols[0],
                            quantidade: String(cols[1]).replace(',', '.')
                        }));
                };

                const parseExcelFile = async (file) => {
                    if (typeof XLSX === 'undefined') {
                        throw new Error('Leitor de Excel não carregado. Recarregue a página e tente novamente.');
                    }

                    const buffer = await file.arrayBuffer();
                    const workbook = XLSX.read(buffer, { type: 'array' });
                    const firstSheet = workbook.SheetNames[0];
                    if (!firstSheet) return [];

                    const worksheet = workbook.Sheets[firstSheet];
                    const rows = XLSX.utils.sheet_to_json(worksheet, {
                        header: 1,
                        raw: false,
                        defval: ''
                    });

                    return parseBulkSheetRows(rows);
                };

                const onBulkFileChange = async (event) => {
                    try {
                        bulkModal.loading = true;
                        const file = event.target.files?.[0];
                        if (!file) return;
                        bulkModal.fileName = file.name;

                        const extension = file.name.toLowerCase().split('.').pop();
                        if (['xls', 'xlsx', 'xlsm'].includes(extension)) {
                            bulkModal.rawRows = await parseExcelFile(file);
                        } else {
                            const text = await file.text();
                            bulkModal.rawRows = parseBulkText(text);
                        }

                        bulkModal.previewRows = [];
                        if (!bulkModal.rawRows.length) {
                            throw new Error('Arquivo sem linhas válidas. Use colunas A|B = codigo_ax|quantidade.');
                        }
                    } catch (error) {
                        errorMessage.value = error.message || String(error);
                    } finally {
                        bulkModal.loading = false;
                    }
                };

                const prepareBulkUpload = async () => {
                    try {
                        bulkModal.loading = true;
                        errorMessage.value = '';
                        const resp = await runGAS('prepareBulkMovimentacao', {
                            rows: bulkModal.rawRows,
                            usuario_email: session.value?.user?.email,
                            data_iso: bulkModal.data_iso,
                            tipo: bulkModal.tipo
                        });
                        if (resp.success === false) throw new Error(resp.message);
                        bulkModal.previewRows = resp.rows || [];
                    } catch (error) {
                        errorMessage.value = error.message || String(error);
                    } finally {
                        bulkModal.loading = false;
                    }
                };

                const generateClientUUID = () => {
                    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                        const r = (Math.random() * 16) | 0;
                        const v = c === 'x' ? r : (r & 0x3) | 0x8;
                        return v.toString(16);
                    });
                };

                const saveBulkUpload = async () => {
                    try {
                        bulkModal.loading = true;
                        errorMessage.value = '';

                        const sanitizedRows = bulkModal.previewRows.map(row => ({
                            ...row,
                            quantidade: Number(row.quantidade),
                            valid: !!row.insumo_id && Number(row.quantidade) > 0,
                            error: (!row.insumo_id ? 'Código AX não encontrado.' : (Number(row.quantidade) > 0 ? '' : 'Quantidade inválida'))
                        }));

                        const requestId = generateClientUUID();
                        const payload = {
                            request_id: requestId,
                            rows: sanitizedRows,
                            usuario_email: session.value?.user?.email,
                            data_iso: bulkModal.data_iso,
                            tipo: bulkModal.tipo,
                            observacao: bulkModal.observacao,
                            file_name: bulkModal.fileName
                        };

                        openProcessModal('Processando upload em lote', 'Validando itens e registrando movimentações...');

                        let resp = null;
                        for (let attempt = 0; attempt < 6; attempt += 1) {
                            try {
                                processModal.message = `Processando requisição (${attempt + 1}/6)...`;
                                resp = await runGAS('saveBulkMovimentacao', payload);
                                if (resp.success === false) throw new Error(resp.message);
                                break;
                            } catch (error) {
                                const msg = error?.message || String(error);
                                if (msg.includes('já em processamento') && attempt < 5) {
                                    processModal.message = 'Requisição em processamento no servidor. Sincronizando resultado...';
                                    await sleep(1200);
                                    continue;
                                }
                                throw error;
                            }
                        }

                        if (!resp) {
                            throw new Error('Não foi possível obter confirmação do upload. Tente novamente em alguns segundos.');
                        }

                        closeProcessModal();
                        closeBulkModal();
                        loadCurrentModuleDebounced();
                        openSuccessModal('Upload concluído com sucesso', `ID: ${resp.upload_id} | Movimentos: ${resp.total_movimentos}`);
                    } catch (error) {
                        closeProcessModal();
                        errorMessage.value = error.message || String(error);
                    } finally {
                        bulkModal.loading = false;
                    }
                };

                const runSeedFornecedores = async () => {
                    try {
                        const resp = await runGAS('seedFornecedoresFromInsumos');
                        if (resp.success === false) throw new Error(resp.message);
                        errorMessage.value = `Seed executado: ${resp.fornecedores_criados} fornecedores criados.`;
                    } catch (error) {
                        errorMessage.value = error.message || String(error);
                    }
                };

                const runBackupSnapshot = async () => {
                    try {
                        const resp = await runGAS('runWeeklyBackupSnapshot');
                        if (resp.success === false) throw new Error(resp.message);
                        errorMessage.value = `Snapshot gerado: ${resp.snapshot_id}`;
                    } catch (error) {
                        errorMessage.value = error.message || String(error);
                    }
                };

                const runBackendTests = async () => {
                    try {
                        const resp = await runGAS('test_runAllCalculations');
                        if (resp.success === false) throw new Error(resp.message);
                        errorMessage.value = resp.message;
                    } catch (error) {
                        errorMessage.value = error.message || String(error);
                    }
                };

                const logout = async () => {
                    session.value = null;
                    currentPage.value = 'dashboard';
                    errorMessage.value = '';
                    form.password = '';
                    Object.assign(moduleData, createModuleState());
                    uploadHistory.value = [];
                    closeBulkModal();
                    await refreshIcons();
                };

                onMounted(refreshIcons);

                return {
                    form,
                    loading,
                    moduleLoading,
                    errorMessage,
                    session,
                    currentPage,
                    pageContent,
                    moduleData,
                    insumosQuery,
                    movForm,
                    uploadHistory,
                    bulkModal,
                    processModal,
                    successModal,
                    isAuthenticated,
                    handleLogin,
                    logout,
                    goToPage,
                    loadCurrentModule,
                    loadInsumos,
                    submitMovimentacao,
                    openBulkModal,
                    closeBulkModal,
                    closeSuccessModal,
                    onBulkFileChange,
                    prepareBulkUpload,
                    saveBulkUpload,
                    runSeedFornecedores,
                    runBackupSnapshot,
                    runBackendTests
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
